<head>
  <title> Todo</title>
</head>

<body>

  <h1> Todo App</h1>

  <form id="taskForm">

    <input
      type="text"
      id="taskInput"
      placeholder="Enter Task"
      required
    >

    <select id="category">

      <option value="Work">Work</option>

      <option value="Personal">Personal</option>

      <option value="Urgent">Urgent</option>

    </select>

    <button type="submit">
      Add Task
    </button>

  </form>

  <ul id="taskList"></ul>

</body>
